<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AR Тест</title>
    <link rel="stylesheet" href="style.css" />
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.151.3/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.151.3/examples/jsm/",
                "mindar-face-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-three.prod.js"
            }
        }
    </script>
</head>
<body>

    <div id="mode-select-screen">
        <div class="mode-card">

            <div id="step-mode">
                <h1 class="mode-title">AR Тест</h1>
                <p class="mode-subtitle">Тест про Тараса Шевченка — оберіть режим AR</p>
                <div class="mode-buttons">
                    <button class="mode-btn" id="btn-mindar">
                        <span class="mode-label">MindAR Face</span>
                        <span class="mode-desc">Модель на обличчі через камеру</span>
                    </button>
                    <button class="mode-btn" id="btn-webxr">
                        <span class="mode-label">WebXR AR</span>
                        <span class="mode-desc">Модель у реальному просторі</span>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- MindAR -->
    <div id="mindar-mode" class="hidden">
        <div id="ar-container"></div>
        <button id="backButton">← Назад</button>
        <div id="quiz-panel">
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progressBarFill"></div>
            </div>
            <div class="progress" id="progress"></div>
            <div class="question" id="questionText"></div>
            <div id="controls-row">
                <div id="mic-container"></div>
                <div id="tts-container"></div>
            </div>
            <div class="wheel" id="wheel">
                <div class="sector sector1" data-index="0"><span></span></div>
                <div class="sector sector2" data-index="1"><span></span></div>
                <div class="sector sector3" data-index="2"><span></span></div>
                <div class="sector sector4" data-index="3"><span></span></div>
            </div>
            <div id="result">
                <div id="resultText"></div>
                <button id="restartBtn">Пройти ще раз</button>
            </div>
        </div>
    </div>

    <!-- WebXR режим -->
    <div id="webxr-mode" class="hidden">
        <canvas id="webxr-canvas"></canvas>
        <button id="webxr-back">← Назад</button>
        <div id="webxr-start-overlay">
            <div class="webxr-start-card">
                <p>Для запуску WebXR AR потрібен пристрій з підтримкою AR</p>
                <button id="webxr-start-btn">Запустити AR</button>
                <p id="webxr-no-support" class="hidden">WebXR AR не підтримується цим пристроєм або браузером</p>
            </div>
        </div>
        <div id="webxr-quiz-overlay">
            <div id="webxr-progress-bar-wrap">
                <div id="webxr-progress-bar-fill"></div>
            </div>
            <div id="webxr-progress-text"></div>
            <div id="webxr-question-text"></div>
            <div id="webxr-answers"></div>
            <div id="webxr-controls-row">
                <div id="webxr-mic-container"></div>
                <div id="webxr-tts-container"></div>
            </div>
            <div id="webxr-result" class="hidden">
                <div id="webxr-result-text"></div>
                <button id="webxr-restart-btn">Пройти ще раз</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
